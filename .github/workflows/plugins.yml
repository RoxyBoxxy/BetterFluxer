name: Build Plugin Index

on:
  push:
    paths:
      - "plugins/**"

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate plugin index
        run: |
          echo '{ "plugins": [' > plugins.json
          first=true

          for dir in plugins/*/; do
            if [ -f "$dir/manifest.json" ]; then

              manifest=$(cat "$dir/manifest.json")
              id=$(jq -r '.id' "$dir/manifest.json")

              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> plugins.json
              fi

              echo "  {" >> plugins.json
              echo "    \"id\": \"$id\"," >> plugins.json
              echo "    \"manifest\": \"https://raw.githubusercontent.com/${{ github.repository }}/main/$dir/manifest.json\"" >> plugins.json
              echo -n "  }" >> plugins.json

            fi
          done

          echo '] }' >> plugins.json

      - name: Commit plugin index
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add plugins.json
          git commit -m "Update plugin index" || echo "No changes"
          git push
