name: CI Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  release:
    types: [published]
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (example: v1.0.0). Leave empty to skip release publish."
        required: false
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build injector (NW zip)
        run: npm run dist:win

      - name: Build injector (one-file exe)
        run: npm run dist:win:onefile

      - name: Build bridge (NW zip)
        run: npm run dist:bridge:win

      - name: Setup WiX CLI
        shell: pwsh
        run: |
          dotnet tool update --global wix --version 6.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build bridge (MSI)
        run: npm run dist:bridge:msi

      - name: List dist contents (Windows)
        shell: pwsh
        run: Get-ChildItem -Recurse dist | Select-Object FullName

      - name: Upload injector windows zip
        uses: actions/upload-artifact@v4
        with:
          name: betterfluxer-injector-windows-zip
          path: dist/nw-win64.zip
          if-no-files-found: error

      - name: Upload injector one-file exe
        uses: actions/upload-artifact@v4
        with:
          name: betterfluxer-injector-windows-onefile
          path: dist/BetterFluxerInjector.exe
          if-no-files-found: error

      - name: Upload bridge windows zip
        uses: actions/upload-artifact@v4
        with:
          name: betterfluxer-bridge-windows-zip
          path: dist/nw-bridge-win64.zip
          if-no-files-found: error

      - name: Upload bridge MSI
        uses: actions/upload-artifact@v4
        with:
          name: betterfluxer-bridge-windows-msi
          path: dist/BetterFluxerBridge-*.msi
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install vendored Fluxer desktop build dependencies
        run: npm ci
        working-directory: do_not_edit/fluxer/fluxer_desktop

      - name: Build injector linux package
        run: npm run dist:linux

      - name: Build bridge linux package
        run: npm run dist:bridge:linux

      - name: List dist contents (Linux)
        run: find dist -maxdepth 4 -type f | sort

      - name: Upload injector linux zip
        uses: actions/upload-artifact@v4
        with:
          name: betterfluxer-injector-linux-zip
          path: dist/nw-linux64.zip
          if-no-files-found: error

      - name: Upload bridge linux zip
        uses: actions/upload-artifact@v4
        with:
          name: betterfluxer-bridge-linux-zip
          path: dist/nw-bridge-linux64.zip
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || (github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name) }}
    steps:
      - name: Download injector windows zip
        uses: actions/download-artifact@v4
        with:
          name: betterfluxer-injector-windows-zip
          path: release-assets

      - name: Download injector one-file exe
        uses: actions/download-artifact@v4
        with:
          name: betterfluxer-injector-windows-onefile
          path: release-assets

      - name: Download bridge windows zip
        uses: actions/download-artifact@v4
        with:
          name: betterfluxer-bridge-windows-zip
          path: release-assets

      - name: Download bridge MSI
        uses: actions/download-artifact@v4
        with:
          name: betterfluxer-bridge-windows-msi
          path: release-assets

      - name: Download injector linux zip
        uses: actions/download-artifact@v4
        with:
          name: betterfluxer-injector-linux-zip
          path: release-assets

      - name: Download bridge linux zip
        uses: actions/download-artifact@v4
        with:
          name: betterfluxer-bridge-linux-zip
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/nw-win64.zip
            release-assets/BetterFluxerInjector.exe
            release-assets/nw-bridge-win64.zip
            release-assets/BetterFluxerBridge-*.msi
            release-assets/nw-linux64.zip
            release-assets/nw-bridge-linux64.zip
