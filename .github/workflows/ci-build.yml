name: CI Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  release:
    types: [published]
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (example: v1.0.0). Leave empty to skip release publish."
        required: false
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows package
        run: npm run dist:win

      - name: Build Bridge EXE
        run: npx --yes pkg@5.8.1 bridge/index.js --targets node18-win-x64 --output dist/bridge/BetterFluxerBridge.exe

      - name: List dist contents (Windows)
        shell: pwsh
        run: Get-ChildItem -Recurse dist | Select-Object FullName

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: betterfluxer-windows-x64
          path: dist/*win32-x64/**
          if-no-files-found: error

      - name: Upload Bridge EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: betterfluxer-bridge-windows-exe
          path: dist/bridge/BetterFluxerBridge.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux package
        run: npm run dist:linux

      - name: List dist contents (Linux)
        run: find dist -maxdepth 4 -type f | sort

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: betterfluxer-linux-x64
          path: dist/*linux-x64/**
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || (github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name) }}
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: betterfluxer-windows-x64
          path: release-assets/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: betterfluxer-linux-x64
          path: release-assets/linux

      - name: Download Bridge EXE artifact
        uses: actions/download-artifact@v4
        with:
          name: betterfluxer-bridge-windows-exe
          path: release-assets/bridge

      - name: Create archives
        run: |
          cd release-assets
          zip -r betterfluxer-windows-x64.zip windows
          tar -czf betterfluxer-linux-x64.tar.gz linux

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/betterfluxer-windows-x64.zip
            release-assets/betterfluxer-linux-x64.tar.gz
            release-assets/bridge/BetterFluxerBridge.exe
